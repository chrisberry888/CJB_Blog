<button class="menu-button" type="button" data-drawer-open aria-label="Open navigation" aria-controls="site-drawer">
  <span></span>
  <span></span>
  <span></span>
</button>

<div class="drawer-overlay" data-drawer-overlay hidden></div>

<aside class="site-drawer" id="site-drawer" aria-hidden="true">
  <div class="drawer-header">
    <a class="drawer-identity drawer-home-link" href="{% url 'home' %}" aria-label="Go to homepage">
      {% if drawer_profile_image_url %}
        <img src="{{ drawer_profile_image_url }}" alt="" class="drawer-avatar">
      {% else %}
        <div class="drawer-avatar drawer-avatar-placeholder" aria-hidden="true">CB</div>
      {% endif %}
      <div>
        <p class="drawer-name">Chris Berry</p>
      </div>
    </a>
    <button class="icon-button" type="button" data-drawer-close aria-label="Close navigation">&times;</button>
  </div>

  <nav class="drawer-nav" aria-label="Primary navigation">
    {% for item in navigation_items %}
      <a href="{{ item.url }}"{% if item.opens_in_new_tab %} target="_blank" rel="noopener noreferrer"{% endif %}>{{ item.label }}</a>
    {% empty %}
      <p class="muted">Run the seed command or add navigation items in admin.</p>
    {% endfor %}
  </nav>

  <div class="drawer-footer">
    {% include "includes/settings_panel.html" %}
  </div>
</aside>
